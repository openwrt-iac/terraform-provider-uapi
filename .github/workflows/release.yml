name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}
      - name: Extract release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          chmod +x scripts/release-notes.sh
          scripts/release-notes.sh "$TAG" > /tmp/release-notes.md
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply release notes from CHANGELOG
        # GoReleaser's --release-notes did not reliably populate the GitHub release
        # body (v2 + changelog.disable), so set it explicitly after GoReleaser has
        # created the release. No-op when the CHANGELOG has no matching section.
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -s /tmp/release-notes.md ]; then
            gh release edit "$TAG" --notes-file /tmp/release-notes.md
          else
            echo "no CHANGELOG section for $TAG; leaving GoReleaser-generated notes"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
