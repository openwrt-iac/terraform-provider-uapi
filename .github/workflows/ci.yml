name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - run: go test -race ./...

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.5.0
      - run: $(go env GOPATH)/bin/golangci-lint run ./...

  docs:
    name: docs up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go generate ./...
      - name: check docs match the schema
        run: |
          if [ -n "$(git status --porcelain docs)" ]; then
            echo "docs/ is out of date. Run 'make docs' and commit the result."
            git status --porcelain docs
            git diff -- docs
            exit 1
          fi

  acceptance:
    name: acceptance (mock)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: acceptance tests against the in-process fake uapi
        run: TF_ACC=1 go test ./internal/provider/ -run TestAcc -count=1 -timeout 15m
